<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BLACK INK STUDIO</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: black;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.7);
    }

    .nav a {
      color: white;
      text-decoration: none;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1590246815117-1a2c1e6e7c3e') no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: black;
      text-decoration: none;
    }

    #about, #gallery, #contact {
      padding: 80px 20px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="#about">About</a>
  <a href="#gallery">Gallery</a>
  <a href="#contact">Booking</a>
</div>

<div class="hero">
  <h1>BLACK INK</h1>
  <p>肌に刻む、あなただけのアート</p>
  <a href="#contact" class="btn">予約する</a>
</div>

<div id="about">
  <h2>About</h2>
  <p>当スタジオについて</p>
</div>

<div id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
    <img src="https://images.unsplash.com/photo-1598373182133-52452f7691ef">
    <img src="https://images.unsplash.com/photo-1581090700227-4c4f50d93c6f">
  </div>
</div>

<div id="contact">
  <h2>Booking</h2>
  <p>ここに予約情報</p>
</div>

</body>
</html>
